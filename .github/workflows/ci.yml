name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch so we don't waste minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Pre-build checks ─────────────────────────────────────────────────
  # Restores packages and validates code formatting.
  # Branch protection requires THIS job to pass by name: "pre-build"
  pre-build:
    name: Pre-build checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Verify code formatting
        # --severity error: only block on errors (whitespace, braces, etc.)
        # Naming convention warnings (IDE1006) are skipped here because dotnet format
        # cannot auto-fix them -- they're enforced as suggestions in the IDE instead.
        run: dotnet format --verify-no-changes --severity error
        continue-on-error: false

  # ── Job 2: Build ─────────────────────────────────────────────────────────────
  # Compiles the project in Release mode, warnings treated as errors.
  # Branch protection requires THIS job to pass by name: "Build"
  build:
    name: Build
    needs: pre-build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        # -p:TreatWarningsAsErrors=false: the codebase has pre-existing nullable
        # warnings (CS8602 etc.) tracked separately. Enable warnings-as-errors
        # incrementally as they're fixed.
        run: dotnet build --configuration Release --no-restore -p:TreatWarningsAsErrors=false

  # ── Job 3: Security scan ──────────────────────────────────────────────────────
  # Runs in PARALLEL with build (both depend only on pre-build).
  # Fails the PR if any NuGet dependency has a known CVE.
  # Branch protection requires THIS job to pass by name: "Security scan"
  security-scan:
    name: Security scan
    needs: pre-build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Scan for vulnerable NuGet packages
        shell: pwsh
        run: |
          $output = dotnet list package --vulnerable --include-transitive 2>&1
          Write-Host $output
          if ($output -match "has the following vulnerable packages") {
            Write-Host "::error::Vulnerable NuGet packages detected. Update them before merging."
            exit 1
          }
          Write-Host "No vulnerable packages found."

  # ── Job 4: Tests ─────────────────────────────────────────────────────────────
  # Runs the full xUnit suite with a 60% line-coverage floor.
  # Branch protection requires THIS job to pass by name: "Test"
  test:
    name: Test
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        # Build the test project (which also builds the main project as a dependency)
        run: dotnet build Tests/SalesforceDebugAnalyzer.Tests.csproj --configuration Release --no-restore -p:TreatWarningsAsErrors=false

      - name: Run tests (with coverage threshold)
        # .runsettings configures coverlet: 60% line coverage floor.
        # If coverage drops below the threshold the step exits non-zero.
        run: >
          dotnet test Tests/SalesforceDebugAnalyzer.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/test-results.trx
            **/coverage.cobertura.xml
          retention-days: 14
